    <div class="rich_media_content js_underline_content autoTypeSetting24psection" id="js_content"  opacity: 0; "><p><span style="font-size: 20px;"><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>什么是金融、金融怎么赚钱、你为什么上钩？</span></span></p><p><span style="font-size: 20px;"><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/></span><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>什么是金融？</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>说人话，说老百姓听得懂的话，</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>金融就是打时间差。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>学术讲叫时间价值。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>那一手交钱一手交货，是金融吗？明显不是。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>没有时间差的不是金融。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI"  255);'>你的风险就是别人的收益。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>你的收益就是别人的风险。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>那既然有风险，怎么骗人上当呢？</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>通过营造良好的预期，编造美妙的故事，或者反其道而行之，采用恐吓的手段。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>房地产、理财靠编故事；</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>保险靠恐吓。</span><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><br style='color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'/><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'>你学会了吗？</span></p><p><span style='font-size: 20px;color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;letter-spacing: normal;text-align: start;white-space: pre-wrap;background-color: rgb(255, 255, 255);'><br/></
