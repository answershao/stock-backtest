    <div class="rich_media_content" id="js_content" ><p style='box-sizing: border-box;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><a data-itemshowtype="0" data-linktype="2" href="http://mp.weixin.qq.com/s?__biz=MzU1NjUwNjM4Ng==&amp;mid=2247484196&amp;idx=1&amp;sn=6a9484a012b7d2eb6fd6733d95843342&amp;chksm=fbc54f59ccb2c64f1d0352953554d0f446a254648edfe6fe4adce5fc56c9f8ac5e10981d76d4&amp;scene=21#wechat_redirect" style="font-size: 18px;" tab="innerlink" target="_blank"><span style="font-size: 18px;">再谈不可重仓的逻辑，能救一个算一个</span></a><br/></p><p style='box-sizing: border-box;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">去年的文章，里面提到了分众传媒。</span><span style="font-size: 17px;"><br style="box-sizing: border-box;"/></span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">我不是来蹭热度的。<br style="box-sizing: border-box;"/></span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">我只想告诉大家，无论你多么自信，无论哪个自封的股神给你推荐，你都不要去重仓！</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><br style="box-sizing: border-box;"/></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">在中国做股票一定要适度分散，最好买十只以上，每只仓位绝不大于10%</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">有的人说某洋大师说3~5只就行了。</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">错了！</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">那是美国的经验，在中国行不通！</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><span style="font-size: 17px;">因为一来中国的公司造假特别严重，二来美国集体诉讼只要一个股民告赢了，全体股民都享受赔偿。在中国，赔你个头！</span></p><p style='box-sizing: border-box;margin-top: 12px;margin-bottom: 12px;word-break: break-all;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: 13px;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);'><br/></p></div>
