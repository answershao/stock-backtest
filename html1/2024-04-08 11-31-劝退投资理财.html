    <div class="rich_media_content js_underline_content autoTypeSetting24psection" id="js_content"  opacity: 0; "><p><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">那种没有200万的。</span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">或者没有明确的职业规划和没有明确的收入预估、未来十年内99%的可能性攒不到200万的朋友。</span><br style='letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);color: rgb(51, 51, 51);font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;font-size: 15px;white-space: pre-wrap;'/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);"></span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">您就别关注我了。</span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);"></span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">金融业总是灌输什么理财的观念，但现实是把你当韭菜 , 255);"></span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">您这个智商，到股市一定会一败涂地的。 </span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">为什么我说的东西您总听不懂？</span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);"></span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">两个原因：</span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">1.您智商不够；</span><br style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;white-space: normal;background-color: rgb(255, 255, 255);"/><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);">2.您不该关注我</span><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);"></span></p><p><span style="color: rgb(53, 53, 53);letter-spacing: normal;text-align: start;background-color: rgb(255, 255, 255);"><
