    <div class="rich_media_content" id="js_content" ><p><span data-offset-key="5nkpf-0-0" style="box-sizing: border-box;">截止今天上午，总预备队已经全部顺利撤出战场。</span></p><p><span data-offset-key="i053-0-0" style="box-sizing: border-box;">经过三个星期鏖战，获利22%</span></p><p><span data-offset-key="2rqut-0-0" style="box-sizing: border-box;">大部队继续坚守，充分支持中国的经济发展，并享受经济发展带来的红利。</span></p><p><span data-offset-key="2rqut-0-0" style="box-sizing: border-box;"><br/></span></p><p><br/></p><p><span data-offset-key="47ao1-0-0" style="box-sizing: border-box;">孙子兵法云：“以正合，以奇胜”</span></p><p><span data-offset-key="bv8lo-0-0" style="box-sizing: border-box;">总预备队主要负责处突、反恐、维和、捕俘等特种作战任务。</span></p><p><span data-offset-key="8f9cb-0-0" style="box-sizing: border-box;">平时吃利息，战时迅速集结。完成任务后迅速撤出战场。</span></p><p><span data-offset-key="8f9cb-0-0" style="box-sizing: border-box;"><br/></span></p><p><span data-offset-key="8clda-0-0" style="box-sizing: border-box;">这支有着光荣传统的队伍，在2015崩盘抄底、2016年2月低吸、2018年6月逐鹿中心通讯、2019年初抄底股市、以及此次疫情护盘中都屡建奇功！</span></p><p><span data-offset-key="8clda-0-0" style="box-sizing: border-box;"><br/></span></p><p><span data-offset-key="1l39b-0-0" style="box-sizing: border-box;">这支部队的战略是：只求高胜率、不求高收益率。</span></p><p><span data-offset-key="2b8oa-0-0" style="box-sizing: border-box;">这支部队的口号是：首战用我，用我必胜！剑锋所指，所向披靡！</span></p><p><br/></p></div>
