    <div class="rich_media_content" id="js_content" ><p>送川普,踏征程</p><p>默默无语两眼泪</p><p>耳边响起键盘声</p><p><br/></p><p><br/></p><p>路漫漫,雾茫茫</p><p>革命生涯常分手</p><p>一样分别两样情</p><p><br/></p><p><br/></p><p>川普啊川普</p><p>亲爱的卧底</p><p>当心夜半北风寒</p><p>一路多保重</p><p><br/></p><p><br/></p><p>送川普,踏征程</p><p>任重道远多艰辛</p><p>洒下一路推特声</p><p><br/></p><p><br/></p><p>山叠嶂,水纵横</p><p>顶风逆水雄心在</p><p>不负人民养育情</p><p><br/></p><p><br/></p><p>川普啊川普</p><p>亲爱的建国</p><p>待到春风传佳讯</p><p>我们再相逢</p><p>再相逢</p><p><br/></p><p><br/></p><p><br/></p><p><br/></p><p>改编自歌曲《送战友》，本想做一下调教，但时间仓促，水平有限，未免贻笑大方。就不做了。待到再相逢的一天，再做。</p><p><br/></p><p>今天是腊月初八，送别了建国，是不是预示某国未来像一锅粥？拭目以待。</p><p><br/></p><section><qqmusic albumid="001ZaCQY2OxVMg" albumurl="https://y.gtimg.cn/music/photo_new/T002R68x68M000001ZaCQY2OxVMg.jpg" audiourl="http://isure6.stream.qqmusic.qq.com/C200002pbPJ24Rgm7Q.m4a?guid=2000001731&amp;vkey=A0C625D58154E5C72BD4A9A4EF54AD74D276A3FDBC40B7D7A4487906493754CC421E524C64227C8FAA01C7B60CA40DC04ADE63EED572EFDB&amp;uin=&amp;fromtag=50" class="js_editor_qqmusic qqmusic_iframe js_uneditable custom_select_card" data-pluginname="insertaudio" jumpurlkey="" mid="0020rX9o4F1d59" music_name="送战友" musicid="121642613" musictype="1" otherid="0020rX9o4F1d59" play_length="206" singer="李双江 - 歌曲合辑" src="/cgi-bin/readtemplate?t=tmpl/qqmusic_tmpl&amp;singer=%E6%9D%8E%E5%8F%8C%E6%B1%9F%20-%20%E6%AD%8C%E6%9B%B2%E5%90%88%E8%BE%91&amp;music_name=%E9%80%81%E6%88%98%E5%8F%8B&amp;albumurl=https%3A%2F%2Fy.gtimg.cn%2Fmusic%2Fphoto_new%2FT002R68x68M000001ZaCQY2OxVMg.jpg&amp;musictype=1"></qqmusic></section><p style='box-sizing: border-box;color: rgb(51, 53, 60);font-family: "Biaodian Pro Sans GB", "Helvetica Neue", Helvetica, Arial, "pingfang sc", "Hiragino Sans GB", "Microsoft YaHei", 微软雅黑, STHeiti, SimSun, sans-serif;font-size: medium;text-align: start;white-space: normal;'><h-char style="box-sizing: border-box;" unicode="3002"><h-inner style="box-sizing: border-box;-webkit-text-emphasis: none;left: 0px;top: 0px;display: inline-block;line-height: 1.1;letter-spaci
