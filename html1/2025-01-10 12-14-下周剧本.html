    <div class="rich_media_content js_underline_content autoTypeSetting24psection" id="js_content"  opacity: 0; "><p>下周K线已经画好。</p><p>下周最好能回补第一、第二缺口，跌破120、250日均线，跌破2900点，至2890一线后急速拉回！</p><p>拉回，但不要收于3000点上方为好。</p><p>这样能最大限度的让韭菜低位割肉、欲仙欲死。</p><p>望剧组各部门深入研究剑导意见，尽快落实。</p><p style="text-align: center;"><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100002996" data-ratio="0.571127502634352" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/nTjpJgKRUqtd6oJcslh4yOttiaRxzGox0ga727z42SOiaBradkKvB2Gn8fQlBh5DCibVUwo7WfeEe08M9g7aWmQaw/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="949" src="https://mmbiz.qpic.cn/mmbiz_jpg/nTjpJgKRUqtd6oJcslh4yOttiaRxzGox0ga727z42SOiaBradkKvB2Gn8fQlBh5DCibVUwo7WfeEe08M9g7aWmQaw/640?wx_fmt=jpeg&amp;from=appmsg" style=""/></p><p style="text-align: center;"><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100002997" data-ratio="0.5702217529039071" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/nTjpJgKRUqtd6oJcslh4yOttiaRxzGox0BTgDA5JH9eM9sLyeNvmpGrAQmSRaUzECShWlhECd2AficK5uMDt7icrQ/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="947" src="https://mmbiz.qpic.cn/mmbiz_jpg/nTjpJgKRUqtd6oJcslh4yOttiaRxzGox0BTgDA5JH9eM9sLyeNvmpGrAQmSRaUzECShWlhECd2AficK5uMDt7icrQ/640?wx_fmt=jpeg&amp;from=appmsg" style=""/></p><p>（本剧本纯属虚构，如有雷同纯属巧合）</p><p><br/></p><p><br/></p><p style="display: none;"><mp-style-type data-value="3"></mp-style-type></p></div>
