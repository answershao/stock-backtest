    <div class="rich_media_content" id="js_content" ><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">投资大师的特点是“抓大放小”</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">黑嘴的特点是“屁事无限放大”</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);"><br style="box-sizing: border-box;"/></p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">一张白纸，上面滴上一滴墨汁，就说这是黑纸。</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">这种逻辑方式便是韭菜的底色。</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">因此，只需无限夸大墨汁的面积，就可以操纵韭菜。</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);"><br style="box-sizing: border-box;"/></p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">昨天中免的跌停和今日的大幅反弹充分说明了这一点。</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);">何时与“非黑即白”的原始思维彻底决裂，何时才能告别韭菜的宿命。</p><p style="box-sizing: border-box;cursor: text;margin-top: 24px;margin-bottom: 24px;counter-reset: list-1 0 list-2 0 list-3 0 list-4 0 list-5 0 list-6 0 list-7 0 list-8 0 list-9 0;line-height: 1.7;font-size: 16px;color: rgb(51, 53, 60);font-family: Helvetica, Arial, sans-serif;text-align: left;white-space: pre-wrap;background-color: rgb(255, 255, 255);"><br/></p></div>
